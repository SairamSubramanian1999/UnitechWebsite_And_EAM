<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Employees - Unitech</title>
  <link rel="stylesheet" href="/css/dark-style.css">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand"><div class="logo">UE</div><h2>Unitech</h2></div>
    <nav class="nav">
      <a href="/admin/dashboard.html">Dashboard</a>
      <a class="active" href="/employee.html">Manage Employees</a>
      <!-- REMOVED ATTENDANCE -->
      <a href="/logout">Logout</a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="left">
        <div>
          <div class="h1">Employee Management</div>
          <div id="welcome-sub" class="muted">Loading user...</div>
        </div>
      </div>
      <div class="actions">
        <div id="emp-id" class="muted small"></div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="grid">

      <!-- EMPLOYEE LIST -->
      <div class="col-12 card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h3 class="h1">Employees</h3>
        </div>

        <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
          <button id="btn-add" class="btn">Add Employee</button>
          <input id="search" class="input" placeholder="Search by name or email">
        </div>

        <table id="employees-table" class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Department</th>
              <th>Job Title</th>
              <th>Phone</th>
              <th>DOJ</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

      </div>

      <!-- EMPLOYEE FORM -->
      <div id="form-panel" class="col-12 card" style="display:none; margin-top:20px;">
        <h3 class="h1" id="form-title">Add Employee</h3>

        <form id="employee-form">

          <input type="hidden" id="emp-id"/>

          <label class="muted">Name
            <input id="emp-name" class="input" required/>
          </label>

          <label class="muted">Email
            <input id="emp-email" class="input" type="email" required/>
          </label>

          <!-- DEPARTMENT DROPDOWN -->
          <label class="muted">Department
            <select id="emp-dept" class="input" size="1">
              <option value="">Select Department</option>
              <option>Software</option>
              <option>Mechanical</option>
              <option>Electrical</option>
              <option>Testing</option>
              <option>Quality Control</option>
              <option>Design</option>
              <option>HR</option>
              <option>Finance</option>
              <option>Inventory</option>
              <option>Production</option>
              <option>Maintenance</option>
            </select>
          </label>

          <!-- JOB TITLE DROPDOWN -->
          <label class="muted">Job Title
            <select id="emp-job" class="input" size="1">
              <option value="">Select Job Title</option>
              <option>Software Engineer</option>
              <option>Senior Engineer</option>
              <option>Team Lead</option>
              <option>Manager</option>
              <option>HR Executive</option>
              <option>HR Manager</option>
              <option>Accountant</option>
              <option>Supervisor</option>
              <option>Technician</option>
              <option>Designer</option>
              <option>QA Engineer</option>
              <option>Production Staff</option>
            </select>
          </label>

          <label class="muted">Phone
            <input id="emp-phone" class="input"/>
          </label>

          <label class="muted">Date of Joining
            <input id="emp-doj" class="input" type="date"/>
          </label>

          <label class="muted">Status
            <select id="emp-status" class="input">
              <option value="ACTIVE">ACTIVE</option>
              <option value="RESIGNED">RESIGNED</option>
              <option value="INACTIVE">INACTIVE</option>
            </select>
          </label>

          <div style="margin-top:12px; display:flex; gap:12px;">
            <button type="submit" class="btn">Save</button>
            <button type="button" id="cancel-btn" class="btn secondary">Cancel</button>
          </div>

        </form>
      </div>

    </div>

    <div class="footer">© Unitech Engineering Works</div>
  </main>
</div>

<script src="/js/common.js"></script>
<script src="/js/employee-app.js"></script>

<script>
(async function () {
  try {
    const me = await apiGet('/api/me');
    document.getElementById("welcome-sub").textContent = "Signed in as " + me.name + " (" + me.role + ")";
    document.getElementById("emp-id").textContent = "ID: " + me.id;
  } catch (e) {}
})();
</script>

</body>
</html>
