<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance - Unitech</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>Attendance Panel</h1>
    <p>Welcome! You can mark your attendance here.</p>

    <button id="btn-check-in" class="primary">Check In</button>
    <button id="btn-check-out" class="secondary">Check Out</button>

    <h2>Your Attendance Records</h2>
    <table id="attendance-table" class="data-table">
        <thead>
        <tr>
            <th>Date</th>
            <th>Check In</th>
            <th>Check Out</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="/js/attendance.js"></script>
</body>
</html>
